services:
  coin-api:
    build: .
    container_name: coin-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # `postgres` resolves to the host stack's postgres container on the
      # external `backend` network; the `crecik` database must exist there.
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/crecik
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      JWT_REMEMBER_ME_EXPIRATION_MS: ${JWT_REMEMBER_ME_EXPIRATION_MS:-604800000}
      JWT_ISSUER: ${JWT_ISSUER:-crecik}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required in production}
      APP_URL: ${APP_URL:?APP_URL is required in production}
      # Joi rejects a missing MAIL_FROM in production, and without the API key
      # every send is skipped with a warning — which is exactly how password
      # reset stayed broken in silence. Both fail closed here so the failure
      # surfaces at `compose up` instead of at the first reset request.
      MAIL_FROM: ${MAIL_FROM:?MAIL_FROM is required in production}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required to send email}
      # Optional: without it the daily digest is skipped and logs why.
      CLIENT_ERRORS_DIGEST_TO: ${CLIENT_ERRORS_DIGEST_TO:-}
      AAAPIS_TOKEN: ${AAAPIS_TOKEN:-}
      UPLOAD_DIR: /app/uploads
      PORT: 8080
    volumes:
      - uploads:/app/uploads
    networks:
      - web
      - backend

volumes:
  uploads:

networks:
  web:
    external: true
  backend:
    external: true
