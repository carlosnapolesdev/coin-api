name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Dummy values: unit tests mock Prisma/Config and never reach a database,
      # but a well-formed environment keeps the Prisma CLI and any config
      # loading happy.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crecik
      JWT_SECRET: ci-only-secret-value-of-32-chars!
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Lint
        # Same globs as the lint script but without --fix, so formatting
        # drift fails the build instead of being silently fixed in CI.
        run: npx eslint "src/**/*.ts" "test/**/*.ts"

      - name: Test
        run: npm test

      - name: Build
        # The entrypoint must land at dist/main.js — the Docker CMD and
        # start:prod depend on that exact path (a stray root-level .ts file
        # in the compilation shifts everything under dist/src/).
        run: npm run build && test -f dist/main.js
